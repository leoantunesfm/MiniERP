<div class="drawer lg:drawer-open">
  
  <input id="main-drawer" type="checkbox" class="drawer-toggle" />
  
  <div class="drawer-content flex flex-col bg-base-200 min-h-screen">
    
    <div class="navbar bg-base-100 shadow-sm w-full sticky top-0 z-10">
      
      <div class="flex-none lg:hidden">
        <label for="main-drawer" aria-label="abrir menu" class="btn btn-square btn-ghost">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-6 h-6 stroke-current">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </label>
      </div>
      
      <div class="flex-1 px-4 text-xl font-bold text-base-content">
        Visão Geral
      </div>
      
      <div class="flex-none gap-4 px-4">
        <span class="text-sm font-medium hidden sm:block">Olá, {{ nomeUsuario }}</span>
        <button (click)="logout()" class="btn btn-error btn-sm btn-outline">
          Sair
        </button>
      </div>
    </div>

    <main class="flex-1 p-6 md:p-10">
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="card bg-base-100 shadow-sm">
          <div class="card-body">
            <h2 class="card-title text-base-content/60 text-sm">Vendas no Mês</h2>
            <p class="text-3xl font-bold text-success">R$ 0,00</p>
          </div>
        </div>
        
        <div class="card bg-base-100 shadow-sm">
          <div class="card-body">
            <h2 class="card-title text-base-content/60 text-sm">Produtos Ativos</h2>
            <p class="text-3xl font-bold text-primary">0</p>
          </div>
        </div>
        
        <div class="card bg-base-100 shadow-sm">
          <div class="card-body">
            <h2 class="card-title text-base-content/60 text-sm">Novos Clientes</h2>
            <p class="text-3xl font-bold text-secondary">0</p>
          </div>
        </div>

      </div>
      
      <div class="mt-8 bg-base-100 rounded-box p-6 shadow-sm min-h-[300px] flex items-center justify-center border border-base-300 border-dashed">
        <p class="text-base-content/50">A área de gráficos entrará aqui no futuro.</p>
      </div>

    </main>
  </div>
  
  <div class="drawer-side z-20">
    <label for="main-drawer" aria-label="fechar menu" class="drawer-overlay"></label>
    
    <aside class="w-64 min-h-full bg-base-100 text-base-content border-r border-base-200 flex flex-col">
      
      <div class="h-16 flex items-center px-6 border-b border-base-200">
        <span class="text-2xl font-black text-primary">MiniERP</span>
      </div>
      
      <ul class="menu p-4 w-full flex-1 gap-1">
        <li>
          <a class="active">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-75" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
            Visão Geral
          </a>
        </li>
        <li>
          <a>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-75" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
            Catálogo
          </a>
        </li>
        <li>
          <a>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-75" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            Financeiro
          </a>
        </li>
      </ul>

      <div class="p-4 border-t border-base-200">
        <p class="text-xs text-center text-base-content/50">MiniERP v1.0.0</p>
      </div>

    </aside>
  </div>
</div>
