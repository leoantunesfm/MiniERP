<div class="drawer lg:drawer-open">
  
  <input id="main-drawer" type="checkbox" class="drawer-toggle" />
  
  <div class="drawer-content flex flex-col bg-base-200 min-h-screen">
    
    <div class="navbar bg-base-100 shadow-sm w-full sticky top-0 z-10">
      
      <div class="flex-none lg:hidden">
        <label for="main-drawer" aria-label="abrir menu" class="btn btn-square btn-ghost">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-6 h-6 stroke-current">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </label>
      </div>
      
      <div class="flex-1 px-4 text-xl font-bold text-base-content">
        MiniERP
      </div>
      
      <div class="flex-none gap-4 px-4">
        <span class="text-sm font-medium hidden sm:block">Olá, {{ nomeUsuario }}</span>
        <button (click)="logout()" class="btn btn-error btn-sm btn-outline">
          Sair
        </button>
      </div>
    </div>

    <main class="flex-1 p-6 md:p-10">
      <router-outlet></router-outlet>
    </main>

  </div>

  <div class="drawer-side">
    <label for="main-drawer" aria-label="fechar menu" class="drawer-overlay"></label>
    
    <div class="w-80 min-h-full bg-base-100 flex flex-col">
      <div class="p-6 text-2xl font-black text-primary border-b border-base-200">
        MiniERP
      </div>

      <ul class="menu p-4 w-full flex-1 gap-1">
        <li>
          <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-75" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
            Visão Geral
          </a>
        </li>

        <li *appHasRole="['Admin']">
          <a routerLink="/dashboard/users" routerLinkActive="active">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-75" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            Equipe
          </a>
        </li>

        <li *appHasRole="['Admin', 'Gerente', 'Operador']">
          <a href="#">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-75" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10" /></svg>
            Vendas
          </a>
        </li>

        <li *appHasRole="['Admin', 'Gerente']">
          <a>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-75" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
            Produtos
          </a>
        </li>

        <li *appHasRole="['Admin', 'Gerente', 'Operador']">
          <a>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-75" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
            Clientes
          </a>
        </li>

        <li *appHasRole="['Admin', 'Gerente']">
          <a>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-75" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
            Estoque
          </a>
        </li>

        <li *appHasRole="['Admin', 'Gerente']">
          <a>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-75" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            Financeiro
          </a>
        </li>
      </ul>
      
      <div class="p-4 border-t border-base-200 bg-base-100 sticky bottom-0">
        <div class="flex items-center gap-3 px-2">
          <div class="avatar placeholder">
            <div class="bg-primary text-primary-content rounded-full w-10">
              <span class="text-xl font-bold">{{ nomeUsuario.substring(0, 1) }}</span>
            </div>
          </div>
          <div class="flex-1 overflow-hidden">
            <p class="text-sm font-bold truncate">{{ nomeUsuario }}</p>
            <p class="text-xs opacity-50 truncate">Bem-vindo ao sistema</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
