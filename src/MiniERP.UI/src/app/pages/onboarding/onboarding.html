<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-2xl w-full space-y-8 bg-white p-10 rounded-xl shadow-lg border border-gray-100">
    
    <div class="text-center">
      <h2 class="mt-2 text-3xl font-extrabold text-gray-900">
        Crie sua conta no MiniERP
      </h2>
      <p class="mt-2 text-sm text-gray-600">
        Gestão simples e isolada para o seu negócio.
      </p>
    </div>

    <div *ngIf="errorMessage" class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
      <p class="text-sm text-red-700">{{ errorMessage }}</p>
    </div>
    <div *ngIf="successMessage" class="bg-green-50 border-l-4 border-green-500 p-4 rounded-md">
      <p class="text-sm text-green-700">{{ successMessage }}</p>
    </div>

    <form [formGroup]="onboardingForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-6">
      
      <h3 class="text-lg font-medium text-gray-900 border-b pb-2">Dados da Empresa</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700">Razão Social</label>
          <input formControlName="razaoSocial" type="text" 
                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Nome Fantasia</label>
          <input formControlName="nomeFantasia" type="text" 
                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700">CNPJ (Somente números)</label>
          <input formControlName="cnpj" type="text" maxlength="14"
                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
      </div>

      <h3 class="text-lg font-medium text-gray-900 border-b pb-2 pt-4">Administrador</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700">Nome Completo</label>
          <input formControlName="nome" type="text" 
                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">E-mail</label>
          <input formControlName="email" type="email" 
                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Senha</label>
          <input formControlName="senha" type="password" 
                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="isLoading"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 transition-colors">
          {{ isLoading ? 'Criando ambiente...' : 'Registrar Empresa' }}
        </button>
      </div>
    </form>
  </div>
</div>
