<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg border border-gray-100">
    
    <div class="text-center">
      <h2 class="mt-2 text-3xl font-extrabold text-gray-900">
        Entrar no MiniERP
      </h2>
      <p class="mt-2 text-sm text-gray-600">
        Acesse o ambiente da sua empresa.
      </p>
    </div>

    <div *ngIf="errorMessage" class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
      <p class="text-sm text-red-700">{{ errorMessage }}</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-6">
      
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">E-mail</label>
          <input formControlName="email" type="email" autocomplete="email"
                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Senha</label>
          <input formControlName="senha" type="password" autocomplete="current-password"
                 class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="isLoading"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 transition-colors">
          {{ isLoading ? 'Entrando...' : 'Entrar' }}
        </button>
      </div>
      
      <div class="text-center mt-4">
        <a routerLink="/onboarding" class="font-medium text-sm text-blue-600 hover:text-blue-500">
          Ainda não tem conta? Registre sua empresa
        </a>
      </div>

    </form>
  </div>
</div>
