<div class="min-h-screen flex items-center justify-center bg-base-200 p-4">
  <div class="card w-full max-w-md bg-base-100 shadow-xl text-center p-8">
    <h2 class="text-2xl font-bold mb-4">Confirmação de E-mail</h2>
    
    @if (isLoading) {
      <div class="flex justify-center my-8">
        <span class="loading loading-spinner loading-lg text-primary"></span>
      </div>
    }
    
    @if (!isLoading && errorMessage) {
      <div class="alert alert-error text-sm">
        <span>{{ errorMessage }}</span>
      </div>
    }

    @if (!isLoading && successMessage) {
      <div class="flex flex-col items-center">
        <div class="text-success mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <p class="font-medium text-lg mb-6">{{ successMessage }}</p>
        <button class="btn btn-primary w-full" (click)="goToLogin()">Ir para o Login</button>
      </div>
    }
  </div>
</div>
