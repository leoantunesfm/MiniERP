version: '3.8'

services:
  # 1. Banco de Dados
  db:
    image: postgres:16-alpine
    container_name: minierp-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: MiniErpDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Interface de Gestão do Banco
  pgadmin:
    image: dpage/pgadmin4
    container_name: minierp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@minierp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

  # 3. Back-end (.NET API)
  api:
    container_name: minierp-api
    build:
      context: ./src
      dockerfile: MiniERP.Api/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=MiniErpDb;Username=postgres;Password=admin_password
    ports:
      - "5209:8080"
    depends_on:
      - db
    restart: unless-stopped

  # 4. Front-end (Angular via Nginx)
  ui:
    container_name: minierp-ui
    build:
      context: ./src/MiniERP.UI
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

  # 5. Fila de Mensageria (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: minierp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  # 6. Servidor SMTP Falso / Mock de E-mail (Mailpit)
  mailpit:
    image: axllent/mailpit
    container_name: minierp-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  # 7. Armazenamento de Arquivos S3 Compatible (MinIO)
  minio:
    image: minio/minio
    container_name: minierp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
    name: minierp-db-data
  rabbitmq_data:
    name: minierp-rabbitmq-data
  minio_data:
    name: minierp-minio-data