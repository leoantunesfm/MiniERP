version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: minierp-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: MiniErpDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: minierp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@minierp.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
    name: minierp-db-data